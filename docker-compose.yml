services:
  nginx:
    image: nginx:latest
    container_name: nexusflow-nginx
    restart: unless-stopped

    depends_on:
      - frontend
      - backend

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    networks:
      - nexusflow-network
  postgres:
    image: postgres:17
    container_name: nexusflow-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    networks:
      - nexusflow-network

  redis:
    image: redis:7
    container_name: nexusflow-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    networks:
      - nexusflow-network

  backend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/nexusflow-backend:latest
    container_name: nexusflow-backend
    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    expose:
      - "8080"

    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}

    networks:
      - nexusflow-network

  frontend:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/nexusflow-ui:latest
    container_name: nexusflow-frontend
    restart: unless-stopped

    depends_on:
      - backend

    expose:
      - "80"

    networks:
      - nexusflow-network

volumes:
  postgres-data:

networks:
  nexusflow-network:
    driver: bridge